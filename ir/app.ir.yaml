{
  "version": "native-desktop-ir/v1",
  "format": "yaml-1.2-json-compatible",
  "app": {
    "id": "owl-native",
    "name": "Owl",
    "targets": ["macos", "linux"],
    "actions": [
      {"id": "focus_new", "title": "New Senders"},
      {"id": "focus_inbox", "title": "Inbox"},
      {"id": "focus_mail", "title": "Mail"},
      {"id": "focus_archive", "title": "Archive"},
      {"id": "focus_favorites", "title": "Favorites"},
      {"id": "focus_people", "title": "People"},
      {"id": "focus_groups", "title": "Groups"},
      {"id": "send_message", "title": "Send Message"},
      {"id": "archive_message", "title": "Remove From Inbox"},
      {"id": "delete_message", "title": "Delete"},
      {"id": "toggle_star", "title": "Star"},
      {"id": "mark_read", "title": "Mark Read"},
      {"id": "open_settings", "title": "Settings"},
      {"id": "choose_mail_root", "title": "Choose Mail Root"},
      {"id": "install_simplex_cli", "title": "Install SimpleX CLI"},
      {"id": "provision_simplex_identity", "title": "Provision SimpleX Identity"},
      {"id": "configure_simplex_local_transport", "title": "Enable Local SimpleX Transport"},
      {"id": "tick_simplex", "title": "Check SimpleX"},
      {"id": "bind_contact", "title": "Bind Contact"},
      {"id": "compose_simplex", "title": "Use SimpleX"},
      {"id": "compose_email", "title": "Use Email"},
      {"id": "quit_app", "title": "Quit"}
    ],
    "state": {
      "mailRoot": "~/mail",
      "selectedRoute": "inbox",
      "selectedTransport": "simplex"
    },
    "window": {
      "id": "window.main",
      "name": "mainWindow",
      "type": "Window",
      "title": "Owl Native",
      "width": 128,
      "minWidth": 96,
      "height": 82,
      "minHeight": 58,
      "menuBar": {
        "id": "menubar.main",
        "type": "MenuBar",
        "children": [
          {
            "id": "menu.app",
            "type": "Menu",
            "title": "Owl",
            "children": [
              {"id": "menuitem.settings", "type": "MenuItem", "title": "Settings", "action": "open_settings", "shortcut": "cmd+,"},
              {"id": "menuitem.quit", "type": "MenuItem", "title": "Quit", "action": "quit_app", "shortcut": "cmd+q"}
            ]
          },
          {
            "id": "menu.view",
            "type": "Menu",
            "title": "View",
            "children": [
              {"id": "menuitem.inbox", "type": "MenuItem", "title": "Inbox", "action": "focus_inbox", "shortcut": "cmd+1"},
              {"id": "menuitem.favorites", "type": "MenuItem", "title": "Favorites", "action": "focus_favorites", "shortcut": "cmd+2"},
              {"id": "menuitem.people", "type": "MenuItem", "title": "People", "action": "focus_people", "shortcut": "cmd+3"},
              {"id": "menuitem.groups", "type": "MenuItem", "title": "Groups", "action": "focus_groups", "shortcut": "cmd+4"}
            ]
          },
          {
            "id": "menu.transport",
            "type": "Menu",
            "title": "Transport",
            "children": [
              {"id": "menuitem.simplex", "type": "MenuItem", "title": "Compose With SimpleX", "action": "compose_simplex"},
              {"id": "menuitem.email", "type": "MenuItem", "title": "Compose With Email", "action": "compose_email"},
              {"id": "menuitem.tickSimplex", "type": "MenuItem", "title": "Check SimpleX", "action": "tick_simplex"}
            ]
          }
        ]
      },
      "toolbar": {
        "id": "toolbar.main",
        "type": "Toolbar",
        "children": [
          {"id": "toolbar.inbox", "type": "Button", "title": "Inbox", "action": "focus_inbox"},
          {"id": "toolbar.spacer", "type": "Spacer"},
          {"id": "toolbar.simplex", "type": "Button", "title": "Check SimpleX", "action": "tick_simplex"},
          {"id": "toolbar.settings", "type": "Button", "title": "Settings", "action": "open_settings"}
        ]
      },
      "content": {
        "id": "content.main",
        "type": "Content",
        "child": {
          "id": "split.messenger",
          "type": "Split",
          "children": [
            {
              "id": "sidebar.contacts",
              "type": "Sidebar",
              "children": [
                {"id": "list.inbox", "type": "List", "title": "Inbox", "action": "focus_inbox"},
                {"id": "list.favorites", "type": "List", "title": "Favorites", "action": "focus_favorites"},
                {"id": "list.people", "type": "List", "title": "People", "action": "focus_people"},
                {"id": "list.groups", "type": "List", "title": "Groups", "action": "focus_groups"}
              ]
            },
            {
              "id": "detail.timeline",
              "type": "Detail",
              "children": [
                {"id": "section.timeline", "type": "Section", "title": "Timeline"},
                {"id": "form.compose", "type": "Form", "title": "Compose"},
                {"id": "select.transport", "type": "Select", "title": "Transport", "action": "compose_simplex"},
                {"id": "button.send", "type": "Button", "title": "Send", "action": "send_message"}
              ]
            }
          ]
        }
      }
    },
    "mock": {
      "contacts": [
        {
          "id": "alice-ledger",
          "kind": "person",
          "name": "Alice Ledger",
          "email": "alice@example.org",
          "simplex_address": "simplex://alice-ledger",
          "favorite": true
        },
        {
          "id": "river-stone",
          "kind": "group",
          "name": "River Stone",
          "email": "",
          "simplex_address": "simplex://river-stone",
          "favorite": true
        }
      ],
      "messages": [
        {
          "id": "seed-email-1",
          "thread_id": "alice-ledger",
          "transport": "email",
          "lock": "open",
          "subject": "Longer email-style note",
          "body": "This is a longer email-shaped message rendered in the same continuous contact timeline as short chat messages.",
          "received_at": "2026-04-20T10:00:00Z",
          "in_inbox": true,
          "from_self": false
        },
        {
          "id": "seed-simplex-1",
          "thread_id": "alice-ledger",
          "transport": "simplex",
          "lock": "closed",
          "subject": "",
          "body": "Short secure reply.",
          "received_at": "2026-04-20T10:03:00Z",
          "in_inbox": false,
          "from_self": true
        }
      ]
    }
  },
  "extensions": []
}
